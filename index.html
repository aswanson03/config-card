<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Alex Swanson — Config 2026</title>
  <meta name="description" content="Senior Product Designer at Strava. Design Systems. Say hi at Config 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .svg-filters {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* Unicorn Studio background layer */
    .us-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Ambient light — fallback while Unicorn loads */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(30, 15, 8, 0.8) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 20% 80%, rgba(10, 20, 50, 0.5) 0%, transparent 50%),
                  radial-gradient(ellipse 50% 30% at 80% 60%, rgba(40, 15, 5, 0.3) 0%, transparent 50%);
    }

    /* Subtle grain texture overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Content Layer */
    .content {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Glass Card Base — the glass IS the show, not the background */
    .glass {
      position: relative;
      backdrop-filter: blur(40px) saturate(120%) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(120%) brightness(1.1);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 28px;
      overflow: hidden;
    }

    /* Internal glow — color trapped INSIDE the glass */
    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0.6;
      pointer-events: none;
    }

    /* Refraction edge highlight */
    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.05) 100%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Hero-specific internal glow */
    .hero::before {
      background: radial-gradient(ellipse 70% 50% at 30% 80%, rgba(200, 60, 10, 0.15) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 60% at 80% 20%, rgba(15, 30, 80, 0.12) 0%, transparent 60%);
    }

    /* Facts-specific internal glow */
    .facts::before {
      background: radial-gradient(ellipse 60% 80% at 70% 50%, rgba(180, 50, 10, 0.08) 0%, transparent 60%);
    }

    /* Link pills — each has a subtle unique internal color */
    .link-pill:nth-child(1)::before {
      background: radial-gradient(ellipse 40% 80% at 0% 50%, rgba(200, 70, 10, 0.1) 0%, transparent 60%);
    }
    .link-pill:nth-child(2)::before {
      background: radial-gradient(ellipse 40% 80% at 100% 50%, rgba(10, 25, 70, 0.1) 0%, transparent 60%);
    }
    .link-pill:nth-child(3)::before {
      background: radial-gradient(ellipse 40% 80% at 0% 50%, rgba(100, 30, 80, 0.08) 0%, transparent 60%);
    }
    .link-pill:nth-child(4)::before {
      background: radial-gradient(ellipse 40% 80% at 100% 50%, rgba(200, 80, 30, 0.08) 0%, transparent 60%);
    }
    .link-pill:nth-child(5)::before {
      background: radial-gradient(ellipse 40% 80% at 0% 50%, rgba(10, 40, 90, 0.08) 0%, transparent 60%);
    }

    /* Hero Card */
    .hero {
      width: 100%;
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05),
                  inset 0 0 20px rgba(0,0,0,0.3),
                  0 0 30px rgba(200, 58, 10, 0.15);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    .company {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .company svg {
      width: 14px;
      height: 14px;
      fill: #FC4C02;
    }

    /* Fun Facts */
    .facts {
      width: 100%;
      padding: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .fact-pill {
      padding: 7px 13px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      white-space: nowrap;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 15px 18px;
      text-decoration: none;
      color: #ffffff;
      border-radius: 20px;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .link-pill:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .link-pill:active {
      transform: scale(0.97);
    }

    .link-pill svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: rgba(255, 255, 255, 0.6);
      transition: fill 0.2s ease, filter 0.2s ease;
    }

    /* Brand colors on hover */
    .link-pill:hover svg { fill: rgba(255, 255, 255, 0.9); }
    .link-pill[href*="x.com"]:hover svg { fill: #ffffff; }
    .link-pill[href*="linkedin"]:hover svg { fill: #0A66C2; filter: drop-shadow(0 0 6px rgba(10, 102, 194, 0.4)); }
    .link-pill[href*="figma"]:hover svg { fill: #A259FF; filter: drop-shadow(0 0 6px rgba(162, 89, 255, 0.4)); }
    .link-pill[href*="mailto"]:hover svg { fill: #FC4C02; filter: drop-shadow(0 0 6px rgba(252, 76, 2, 0.3)); }
    .link-pill[href*="super.site"]:hover svg { fill: #ffffff; }

    .link-pill span {
      font-size: 14px;
      font-weight: 500;
    }

    .link-pill .link-arrow {
      margin-left: auto;
      opacity: 0.3;
      font-size: 16px;
    }

    /* Footer */
    .footer {
      padding-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .glass {
        filter: none;
      }
    }
  </style>
</head>
<body>

  <!-- SVG Filters for subtle glass refraction -->

    <defs>
      <filter id="glass-refract" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.02 0.015"
          numOctaves="2"
          seed="5"
          result="noise"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="3"
          xChannelSelector="R"
          yChannelSelector="G"

  <!-- Unicorn Studio WebGL background -->

  </main>

  <script src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.2.5/dist/unicornStudio.umd.js"></script>
  <script>UnicornStudio.init();</script>

  <script>
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const hero = document.querySelector('.hero');
      if (!hero) return;
      let t = 0;

      const style = document.createElement('style');
      style.textContent = `
        .hero::before {
          background: radial-gradient(ellipse 70% 50% at var(--gx1, 30%) var(--gy1, 80%), rgba(200, 60, 10, 0.15) 0%, transparent 70%),
                      radial-gradient(ellipse 50% 60% at var(--gx2, 80%) var(--gy2, 20%), rgba(15, 30, 80, 0.12) 0%, transparent 60%) !important;
        }
      `;
      document.head.appendChild(style);

      function animateGlow() {
        t += 0.003;
        hero.style.setProperty('--gx1', (30 + Math.sin(t) * 15) + '%');
        hero.style.setProperty('--gy1', (80 + Math.cos(t * 0.7) * 15) + '%');
        hero.style.setProperty('--gx2', (80 + Math.cos(t * 0.5) * 12) + '%');
        hero.style.setProperty('--gy2', (20 + Math.sin(t * 0.8) * 12) + '%');
        requestAnimationFrame(animateGlow);
      }
      animateGlow();
    })();
  </script>

</body>
</html>
